<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Gestor de Usuarios</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #f1f1f1;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        img {
            width: 20vh;
            border-radius: 50%;
        }
        
        .container {
            width: 90%;
            max-width: 500px;
            background-color: #333;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .container button, .container input {
            width: 90%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 5px;
        }
        
        #searchInput {
            width: 85%;
        }
        button {
            background-color: #e50914;
            color: #fff;
            cursor: pointer;
        }
        button:hover {
            background-color: #b20710;
        }
        .hidden {
            display: none;
        }
        .user-card {
            background-color: #444;
            padding: 15px;
            margin-top: 10px;
            border-radius: 10px;
        }
        strong {
            color: rgb(207, 31, 31);
        }
    </style>
</head>
<body>

    <img src="../imagenes/hbomax.jpeg">

    <div class="container">
        <input type="text" id="searchInput" placeholder="Buscar por correo" oninput="searchUser()">
        <button onclick="toggleForm()">Agregar Usuario</button>

        <br><br>

        <form id="dataForm" class="hidden" onsubmit="saveData(event)">
            <input type="email" id="email" placeholder="Correo" required>
            <input type="text" id="password" placeholder="Contraseña" required>
            <input type="text" id="profile" placeholder="Perfil">
            <input type="text" id="pin" placeholder="PIN">
            <input type="text" id="date" placeholder="Fecha" required>
            <input type="tel" id="phone" placeholder="Teléfono" required>
            <input type="text" id="link" placeholder="Link TV">
            <button type="submit">Enviar</button>
        </form>

        <div id="userList"></div>
    </div>

    <script>
        let editUserId = null; // Variable para almacenar el ID del usuario que se está editando

        function toggleForm() {
            document.getElementById('dataForm').classList.toggle('hidden');
            if (editUserId === null) {
                resetForm(); // Reiniciar el formulario solo si no se está editando
            }
        }

        function resetForm() {
            document.getElementById('dataForm').reset(); // Reiniciar el formulario
        }

        function saveData(event) {
            event.preventDefault();

            const userData = {
                id: editUserId ? editUserId : Date.now(),
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                profile: document.getElementById('profile').value,
                pin: document.getElementById('pin').value,
                date: document.getElementById('date').value,
                phone: document.getElementById('phone').value,
                link: document.getElementById('link').value,
                createdAt: new Date().toLocaleString()
            };

            let users = JSON.parse(localStorage.getItem('hbo_users')) || [];

            if (editUserId) {
                // Actualizar el usuario existente
                users = users.map(user => user.id === editUserId ? userData : user);
                editUserId = null; // Reiniciar el ID después de la edición
            } else {
                // Agregar nuevo usuario
                users.push(userData);
            }

            localStorage.setItem('hbo_users', JSON.stringify(users));

            document.getElementById('dataForm').reset(); // Reiniciar el formulario
            toggleForm();
            displayUsers();
        }

        function displayUsers(users = JSON.parse(localStorage.getItem('hbo_users')) || []) {
            const userList = document.getElementById('userList');
            userList.innerHTML = '';

            users.forEach(user => {
                const userCard = document.createElement('div');
                userCard.className = 'user-card';
                userCard.innerHTML = `
                    <p><strong>Correo:</strong> ${user.email}</p>
                    <p><strong>Contraseña:</strong> ${user.password}</p>
                    <p><strong>Perfil:</strong> ${user.profile}</p>
                    <p><strong>PIN:</strong> ${user.pin}</p>
                    <p><strong>Fecha de exp:</strong> ${user.date}</p>
                    <p><strong>Teléfono:</strong> ${user.phone}</p>
                    <p><strong>Link TV:</strong> ${user.link}</p>
                    <p><strong>Fecha de creación:</strong> ${user.createdAt}</p>
                    <button onclick="deleteUser(${user.id})">Eliminar usuario</button>
                    <button onclick="editUser(${user.id})">Editar</button>
                `;
                userList.appendChild(userCard);
            });
        }

        function searchUser() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const users = JSON.parse(localStorage.getItem('hbo_users')) || [];
            const filteredUsers = users.filter(user => user.email.toLowerCase().includes(searchTerm));
            displayUsers(filteredUsers);
        }

        function deleteUser(userId) {
            let users = JSON.parse(localStorage.getItem('hbo_users')) || [];
            users = users.filter(user => user.id !== userId);
            localStorage.setItem('hbo_users', JSON.stringify(users));
            displayUsers();
        }

        function editUser(userId) {
            let users = JSON.parse(localStorage.getItem('hbo_users')) || [];
            const user = users.find(user => user.id === userId);
            if (user) {
                // Rellenar el formulario con los datos del usuario a editar
                document.getElementById('email').value = user.email;
                document.getElementById('password').value = user.password;
                document.getElementById('profile').value = user.profile;
                document.getElementById('pin').value = user.pin;
                document.getElementById('date').value = user.date;
                document.getElementById('phone').value = user.phone;
                document.getElementById('link').value = user.link;
                editUserId = userId;  // Establecer el ID del usuario a editar
                toggleForm();  // Mostrar el formulario
            }
        }

        window.onload = function() {
            displayUsers(); // Cargar usuarios al cargar la página
        };
    </script>
</body>
</html>
