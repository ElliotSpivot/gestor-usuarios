<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youtube - Gestor de Usuarios</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #f1f1f1;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        img {
        width: 20vh;
        border-radius: 50%;
        }
        
        .container {
            width: 90%;
            max-width: 500px;
            background-color: #333;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .container button, .container input {
            width: 90%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 5px;
        }
        
        #searchInput {
        width: 85%;
        }
        button {
            background-color: #e50914;
            color: #fff;
            cursor: pointer;
        }
        button:hover {
            background-color: #b20710;
        }
        .hidden {
            display: none;
        }
        .user-card {
            background-color: #444;
            padding: 15px;
            margin-top: 10px;
            border-radius: 10px;
        }
        strong {
            color: rgb(207, 31, 31);
        }
    </style>
</head>
<body>

    <img src="/imagenes/youtube.jpg">

    <div class="container">
        <!-- Campo de búsqueda -->
        <input type="text" id="searchInput" placeholder="Buscar por correo" oninput="searchUser()">

        <button onclick="toggleForm()">Agregar Usuario</button>

    <br><br>

        <!-- Formulario -->
        <form id="dataForm" class="hidden" onsubmit="saveData(event)">
            <input type="email" id="email" placeholder="Correo" required>
            <input type="text" id="password" placeholder="Contraseña" required>
            <input type="text" id="date" placeholder="Fecha" required>
            <input type="tel" id="phone" placeholder="Teléfono" required>
            <button type="submit">Enviar</button>
        </form>

        <!-- Lista de usuarios -->
        <div id="userList"></div>
    </div>

    <script>
    function toggleForm() {
            document.getElementById('dataForm').classList.toggle('hidden');
        }

        function saveData(event) {
            event.preventDefault();
            
            const userData = {
                id: Date.now(),
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                date: document.getElementById('date').value,
                phone: document.getElementById('phone').value,
                createdAt: new Date().toLocaleString() 
            };

            let users = JSON.parse(localStorage.getItem('youtube_users')) || [];
            users.push(userData);
            localStorage.setItem('youtube_users', JSON.stringify(users));

            document.getElementById('dataForm').reset();
            toggleForm();
            displayUsers();
        }

        function displayUsers(users = JSON.parse(localStorage.getItem('youtube_users')) || []) {
            const userList = document.getElementById('userList');
            userList.innerHTML = '';

            users.forEach(user => {
                const userCard = document.createElement('div');
                userCard.className = 'user-card';
                userCard.innerHTML = `
                    <p><strong>Correo:</strong> ${user.email}</p>
                    <p><strong>Contraseña:</strong> ${user.password}</p>
                    <p><strong>F. VENCIMIENTO:</strong> ${user.date}</p>
                    <p><strong>Teléfono:</strong> ${user.phone}</p>
                    <p><strong>Fecha de creación:</strong> ${user.createdAt}</p>
                    <button onclick="deleteUser(${user.id})">Eliminar usuario</button>
                `;
                userList.appendChild(userCard);
            });
        }

        function searchUser() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const users = JSON.parse(localStorage.getItem('youtube_users')) || [];
            const filteredUsers = users.filter(user => user.email.toLowerCase().includes(searchTerm));
            displayUsers(filteredUsers);
        }

        function deleteUser(userId) {
            let users = JSON.parse(localStorage.getItem('youtube_users')) || [];
            users = users.filter(user => user.id !== userId);
            localStorage.setItem('youtube_users', JSON.stringify(users));
            displayUsers();
        }

        window.onload = function() {
            displayUsers();
        };
    </script>
</body>
</html>
